<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>MinhaTirinha | Wiki Oficial</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    /* COR DO TEMA (Troque aqui para mudar a cor de tudo) */
    :root {
      --theme-color: #4A90E2; 
    }

    /* Estilo da Barra Superior (Igual ao Grupo 1) */
    .app-nav {
      position: sticky;
      margin: 0;
      padding: 12px 0;
      background-color: var(--theme-color); /* Pinta o fundo */
      color: white;
      left: 0;
      right: 0;
      text-align: center;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    .app-nav a {
      color: white !important;
      font-weight: bold;
      margin: 0 15px;
      text-decoration: none;
    }
    .app-nav a:hover {
      text-decoration: underline;
    }

    /* Ajuste da logo na sidebar */
    .sidebar .sidebar-nav img {
      margin-bottom: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="app">Carregando MinhaTirinha...</div>
  
  <script>
    window.$docsify = {
      name: 'MinhaTirinha - G08',
      repo: 'https://github.com/Marjoriemitzi/2026.1-T01-G08_MinhaTirinha_Entrega_01',
      
      loadSidebar: true,   // Menu lateral
      loadNavbar: true,    // ATIVA A BARRA COLORIDA NO TOPO
      subMaxLevel: 2,      // Mostra tópicos das tabelas no menu
      auto2top: true,      // Sobe ao topo na troca de página
      
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Pesquisar...',
        noData: 'Nada encontrado!',
        depth: 4
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
